<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon — NCR Technologies</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cyan: #00d4ff;
    --bg: #020912;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(0,212,255,0.18);
    --text: #e8f4ff;
    --muted: rgba(232,244,255,0.5);
  }
  html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 70%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 85%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 45%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,.3) 0%, transparent 100%);
  }
  .orb-wrap { position: fixed; bottom: -20vw; left: 50%; transform: translateX(-50%); width: 70vw; height: 70vw; max-width: 700px; max-height: 700px; pointer-events: none; z-index: 0; }
  .orb { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 50% 30%, rgba(0,212,255,0.55) 0%, rgba(0,100,180,0.35) 35%, rgba(0,40,80,0.15) 65%, transparent 100%); animation: pulse 5s ease-in-out infinite; filter: blur(2px); }
  .orb-glow { position: absolute; inset: -10%; border-radius: 50%; background: radial-gradient(circle at 50% 30%, rgba(0,212,255,0.2) 0%, transparent 70%); animation: pulse 5s ease-in-out infinite reverse; }
  .orb-top { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; border-radius: 50%; background: white; box-shadow: 0 0 12px 6px rgba(0,212,255,0.9), 0 0 40px 20px rgba(0,212,255,0.4); animation: blink 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .85; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 28px 48px; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .logo span { color: var(--cyan); }
  .btn-contact { padding: 9px 24px; border-radius: 50px; border: 1px solid var(--card-border); background: transparent; color: var(--text); font-size: 14px; font-family: inherit; text-decoration: none; transition: all .2s; backdrop-filter: blur(8px); display: inline-block; }
  .btn-contact:hover { background: rgba(0,212,255,0.12); border-color: var(--cyan); color: var(--cyan); }
  .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px 120px; text-align: center; }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--cyan); margin-bottom: 28px; animation: fadeUp .8s ease both; }
  .heading { font-size: clamp(52px, 9vw, 110px); font-weight: 900; letter-spacing: 0.18em; line-height: 1; background: linear-gradient(135deg, #ffffff 0%, var(--cyan) 60%, #0088bb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: fadeUp .8s .1s ease both; margin-bottom: 12px; }
  .sub-heading { font-size: clamp(14px, 2vw, 18px); font-weight: 300; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 56px; animation: fadeUp .8s .2s ease both; }
  .countdown { display: flex; gap: clamp(12px, 3vw, 28px); margin-bottom: 52px; animation: fadeUp .8s .3s ease both; }
  .flip-unit { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .flip-card { position: relative; width: clamp(72px, 12vw, 100px); height: clamp(72px, 12vw, 100px); background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: clamp(32px, 5.5vw, 52px); font-weight: 700; color: var(--cyan); backdrop-filter: blur(12px); box-shadow: 0 0 0 1px rgba(0,212,255,0.06), 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06); overflow: hidden; }
  .flip-card::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: rgba(0,212,255,0.15); }
  .flip-card.tick { animation: tick .2s ease; }
  .flip-label { font-size: 10px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); }
  @keyframes tick { 0% { transform: scaleY(1); } 30% { transform: scaleY(0.94); } 100% { transform: scaleY(1); } }
  .description { font-size: 15px; font-weight: 400; color: var(--muted); max-width: 440px; line-height: 1.7; margin-bottom: 28px; animation: fadeUp .8s .4s ease both; }
  .contact-block { display: flex; flex-direction: column; align-items: center; gap: 10px; animation: fadeUp .8s .5s ease both; }
  .contact-label { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
  .contact-email { font-size: 16px; font-weight: 500; color: var(--cyan); text-decoration: none; padding: 12px 28px; border: 1px solid var(--card-border); border-radius: 50px; backdrop-filter: blur(12px); background: var(--card-bg); transition: all .2s; letter-spacing: 0.02em; }
  .contact-email:hover { background: rgba(0,212,255,0.1); border-color: var(--cyan); box-shadow: 0 4px 24px rgba(0,212,255,0.2); }
  .socials { position: fixed; right: 24px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; }
  .socials::before, .socials::after { content: ''; width: 1px; height: 60px; background: linear-gradient(to bottom, transparent, var(--card-border)); }
  .socials::after { background: linear-gradient(to top, transparent, var(--card-border)); }
  .social-link { writing-mode: vertical-rl; text-orientation: mixed; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
  .social-link:hover { color: var(--cyan); }
  .dots { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
  .dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--card-border); transition: all .3s; }
  .dot.active { background: var(--cyan); border-color: var(--cyan); width: 24px; border-radius: 4px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 640px) { nav { padding: 20px 20px; } .socials { display: none; } .countdown { gap: 10px; } .flip-card { border-radius: 10px; } }
</style>
</head>
<body>
<div class="stars"></div>
<div class="orb-wrap">
  <div class="orb-glow"></div>
  <div class="orb"></div>
  <div class="orb-top"></div>
</div>
<div class="page">
  <nav>
    <div class="logo"><span>NCR</span> Technologies</div>
    <a class="btn-contact" href="mailto:info@ncrverify.in">Contact Us</a>
  </nav>
  <div class="hero">
    <div class="eyebrow">Something big is coming</div>
    <div class="heading">COMING<br>SOON</div>
    <div class="sub-heading">We're crafting something extraordinary. Stay tuned.</div>
    <div class="countdown">
      <div class="flip-unit"><div class="flip-card" id="days">00</div><div class="flip-label">Days</div></div>
      <div class="flip-unit"><div class="flip-card" id="hours">00</div><div class="flip-label">Hours</div></div>
      <div class="flip-unit"><div class="flip-card" id="minutes">00</div><div class="flip-label">Minutes</div></div>
      <div class="flip-unit"><div class="flip-card" id="seconds">00</div><div class="flip-label">Seconds</div></div>
    </div>
    <p class="description">We're launching a corporate BG Verification platform.</p>
    <div class="contact-block">
      <span class="contact-label">Get in touch</span>
      <a class="contact-email" href="mailto:info@ncrverify.in">info&#64;ncrverify.in</a>
    </div>
  </div>
</div>
<div class="socials">
  <a class="social-link" href="#">Instagram</a>
  <a class="social-link" href="#">Facebook</a>
  <a class="social-link" href="#">Twitter</a>
</div>
<div class="dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>
<script>
  const LAUNCH = new Date('2026-07-13T00:00:00');
  const pad = n => String(n).padStart(2, '0');
  let prev = {};
  function tick() {
    const now = new Date();
    const diff = Math.max(0, LAUNCH - now);
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const vals = { days: d, hours: h, minutes: m, seconds: s };
    Object.entries(vals).forEach(([key, val]) => {
      const el = document.getElementById(key);
      const str = pad(val);
      if (str !== prev[key]) {
        el.textContent = str;
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
        prev[key] = str;
      }
    });
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
